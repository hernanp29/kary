name: Keep Supabase alive

# Corre todos los días a las 12:00 UTC (9:00 AM Argentina) para que el
# proyecto de Supabase nunca pase 7 días sin recibir un request y se pause
# solo. También se puede correr manualmente desde la pestaña "Actions".
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping a la API de Supabase
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/workshops?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")

          echo "Respuesta de Supabase: HTTP $HTTP_CODE"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "OK: el proyecto sigue activo."
          else
            echo "::error::Supabase respondió con código $HTTP_CODE. Revisá si el proyecto está pausado o si cambiaron las credenciales."
            exit 1
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
